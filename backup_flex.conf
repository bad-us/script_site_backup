# =============================================================================
# backup_flex.conf — гибкие настройки расписания и окружения
# =============================================================================

# --- Режим уведомлений ---
# telegram - только Telegram
# email    - только email
# both     - и Telegram, и email
# none     - отключить уведомления
NOTIFY_MODE="email"

# --- Telegram ---
TELEGRAM_BOT_TOKEN="<TELEGRAM_BOT_ID>"
TELEGRAM_CHAT_ID="<CHAT_ID>"

# --- Email / SMTP ---
# Рабочая схема:
#   SMTP_USER = site.alerts@it-prst.ru
#   MAIL_FROM = site.alerts@prst.ru
#   SMTP через STARTTLS на 587
SMTP_SCHEME="starttls"
SMTP_HOST="<SMTP_HOST>"
SMTP_PORT="587"
SMTP_USER="<SMTP_USER>"
SMTP_PASS="<PASSWORD>"
MAIL_FROM="<MAIL_FROM>"
MAIL_TO="<MAIL_TO>"

# --- MySQL ---
DB_HOST="127.0.0.1"
DB_PORT="3306"
DB_USER="<DB_USER>"
DB_PASS="<PASSWORD>"
DB_NAME="<DB_NAME>"

# --- Пути ---
BACKUP_BASE="<PATH_BACKUP>" # (/home/USER/backup)
SITE_PATH="<SITE_PATH>" # (/var/www/prmsth/data/www/SITE)

# Исключения tar
TAR_EXCLUDES=(
  "--exclude=${SITE_PATH}/bitrix/backup"
  "--exclude=${SITE_PATH}/bitrix/managed_cache"
)

# --- SFTP ---
SFTP_HOST="<IP_HOST>"
SFTP_PORT="<PORT>"
SFTP_USER="<USER>"
SFTP_PASS='<PASSWORD>'
SFTP_REMOTE_BASE="<PATH_TO_BACKUP>" # "files" OR "\FILES" OR "."

# Режим авторизации:
# auto     - сначала ключ, потом пароль
# key      - только ключ
# password - только пароль
SFTP_AUTH_MODE="auto"

# Путь до приватного ключа
SFTP_KEY_FILE="/home/USER/.ssh/id_ed25519"

# --- Ретеншн ---
RETENTION_DAYS=7

# =============================================================================
# Расписание (для режима --mode auto)
# day-of-week: 1=Пн ... 6=Сб ... 7=Вс
# =============================================================================

# Дни, в которые разрешены FULL
FULL_DAYS=(1 2 3 4 5 6 7)

# Времена FULL в эти дни
FULL_TIMES=("02:00")

# Дни, в которые разрешены INCR
INCR_DAYS=(1 2 3 4 5 6 7)

# Времена INCR в эти дни
INCR_TIMES=("11:00" "13:00" "15:00" "17:00")

# Точность совпадения времени для auto-режима (в минутах)
AUTO_TOLERANCE_MIN=2
